<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #3366cc;
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
        
        .form-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        
        .form-section h2 {
            margin-top: 0;
            color: #3366cc;
            font-size: 18px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        
        button {
            background-color: #3366cc;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            position: relative;
            min-width: 100px;
        }
        
        button:hover:not(:disabled) {
            background-color: #254e9c;
        }
        
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        
        .response {
            margin-top: 10px;
            padding: 10px;
            border-radius: 3px;
            display: none;
        }
        
        .success {
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
            color: #3c763d;
        }
        
        .error {
            background-color: #f2dede;
            border: 1px solid #ebccd1;
            color: #a94442;
        }
        
        .info {
            background-color: #d9edf7;
            border: 1px solid #bce8f1;
            color: #31708f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Secure Login System</h1>
        
        <!-- Register Section -->
        <div class="form-section">
            <h2>1. Register (Signup)</h2>
            <form id="registerForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
                
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="SecurePass123!" required>
                
                <button type="submit">Register</button>
            </form>
            <div id="registerResponse" class="response"></div>
        </div>
        
        <!-- Verify OTP Section -->
        <div class="form-section">
            <h2>2. Verify OTP</h2>
            <form id="verifyOtpForm">
                <label for="verifyEmail">Email:</label>
                <input type="email" id="verifyEmail" name="email" placeholder="john@example.com" required>
                
                <label for="otp">OTP:</label>
                <input type="text" id="otp" name="otp" placeholder="123456" required>
                
                <button type="submit">Verify OTP</button>
            </form>
            <div id="verifyOtpResponse" class="response"></div>
        </div>
        
        <!-- Login Section -->
        <div class="form-section">
            <h2>3. Login</h2>
            <form id="loginForm">
                <label for="loginEmail">Email:</label>
                <input type="email" id="loginEmail" name="email" placeholder="john@example.com" required>
                
                <label for="loginPassword">Password:</label>
                <input type="password" id="loginPassword" name="password" placeholder="SecurePass123!" required>
                
                <button type="submit">Login</button>
            </form>
            <div id="loginResponse" class="response"></div>
        </div>
        
        <!-- Forgot Password Section -->
        <div class="form-section">
            <h2>4. Forgot Password</h2>
            <form id="forgotPasswordForm">
                <label for="forgotEmail">Email:</label>
                <input type="email" id="forgotEmail" name="email" placeholder="john@example.com" required>
                
                <button type="submit">Request Password Reset</button>
            </form>
            <div id="forgotPasswordResponse" class="response"></div>
        </div>
        
        <!-- Verify Reset OTP Section -->
        <div class="form-section">
            <h2>5. Verify Reset OTP</h2>
            <form id="verifyResetOtpForm">
                <label for="resetEmail">Email:</label>
                <input type="email" id="resetEmail" name="email" placeholder="john@example.com" required>
                
                <label for="resetOtp">OTP:</label>
                <input type="text" id="resetOtp" name="otp" placeholder="123456" required>
                
                <button type="submit">Verify Reset OTP</button>
            </form>
            <div id="verifyResetOtpResponse" class="response"></div>
        </div>
        
        <!-- Set New Password Section -->
        <div class="form-section">
            <h2>6. Set New Password</h2>
            <form id="setNewPasswordForm">
                <label for="newPassEmail">Email:</label>
                <input type="email" id="newPassEmail" name="email" placeholder="john@example.com" required>
                
                <label for="newPassword">New Password:</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="NewSecurePass123!" required>
                
                <button type="submit">Set New Password</button>
            </form>
            <div id="setNewPasswordResponse" class="response"></div>
        </div>
        
        <!-- Resend OTP Section -->
        <div class="form-section">
            <h2>7. Resend OTP</h2>
            <form id="resendOtpForm">
                <label for="resendEmail">Email:</label>
                <input type="email" id="resendEmail" name="email" placeholder="john@example.com" required>
                
                <button type="submit">Resend OTP</button>
            </form>
            <div id="resendOtpResponse" class="response"></div>
        </div>
    </div>

    <script>
        // Base URL for API calls
        const baseUrl = "http://localhost:5000";
        
        // Helper function to display response messages
        function showResponse(elementId, message, isSuccess = true) {
            const responseElement = document.getElementById(elementId);
            responseElement.textContent = message;
            responseElement.className = 'response ' + (isSuccess ? 'success' : 'error');
            responseElement.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                responseElement.style.display = 'none';
            }, 5000);
        }
        
        // Helper function to set button loading state
        function setButtonLoading(button, isLoading) {
            if (isLoading) {
                const originalText = button.textContent.trim();
                button.dataset.originalText = originalText;
                button.disabled = true;
                button.innerHTML = '<span class="loading-spinner"></span>Loading...';
            } else {
                button.disabled = false;
                const originalText = button.dataset.originalText;
                if (originalText) {
                    button.textContent = originalText;
                }
            }
        }
        
        // Helper function to make API calls
        async function makeApiCall(url, method, data, buttonElement = null) {
            // Set loading state
            if (buttonElement) {
                setButtonLoading(buttonElement, true);
            }
            
            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                return { success: response.ok, data: result };
            } catch (error) {
                return { success: false, data: { message: 'Network error: ' + error.message } };
            } finally {
                // Remove loading state
                if (buttonElement) {
                    setButtonLoading(buttonElement, false);
                }
            }
        }
        
        // Register form handler
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/signup`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('registerResponse', 'Registration successful! OTP has been sent to your email.', true);
            } else {
                showResponse('registerResponse', result.data.message || 'Registration failed.', false);
            }
        });
        
        // Verify OTP form handler
        document.getElementById('verifyOtpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                email: document.getElementById('verifyEmail').value,
                otp: document.getElementById('otp').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/verify-otp`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('verifyOtpResponse', 'OTP verified successfully! JWT token: ' + (result.data.token || 'Received'), true);
            } else {
                showResponse('verifyOtpResponse', result.data.message || 'OTP verification failed.', false);
            }
        });
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/login`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('loginResponse', 'Login successful! Token: ' + (result.data.token || 'Received'), true);
            } else {
                showResponse('loginResponse', result.data.message || 'Login failed.', false);
            }
        });
        
        // Forgot Password form handler
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                email: document.getElementById('forgotEmail').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/forgot-password`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('forgotPasswordResponse', 'Password reset requested! OTP has been sent to your email.', true);
            } else {
                showResponse('forgotPasswordResponse', result.data.message || 'Password reset request failed.', false);
            }
        });
        
        // Verify Reset OTP form handler
        document.getElementById('verifyResetOtpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                email: document.getElementById('resetEmail').value,
                otp: document.getElementById('resetOtp').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/verify-reset-otp`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('verifyResetOtpResponse', 'Reset OTP verified successfully! You can now set a new password.', true);
            } else {
                showResponse('verifyResetOtpResponse', result.data.message || 'Reset OTP verification failed.', false);
            }
        });
        
        // Set New Password form handler
        document.getElementById('setNewPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                email: document.getElementById('newPassEmail').value,
                newPassword: document.getElementById('newPassword').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/set-new-password`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('setNewPasswordResponse', 'New password set successfully! JWT token: ' + (result.data.token || 'Received'), true);
            } else {
                showResponse('setNewPasswordResponse', result.data.message || 'Failed to set new password.', false);
            }
        });
        
        // Resend OTP form handler
        document.getElementById('resendOtpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const button = this.querySelector('button[type="submit"]');
            const formData = {
                email: document.getElementById('resendEmail').value
            };
            
            const result = await makeApiCall(`${baseUrl}/api/auth/resend-otp`, 'POST', formData, button);
            
            if (result.success) {
                showResponse('resendOtpResponse', 'OTP has been resent to your email.', true);
            } else {
                showResponse('resendOtpResponse', result.data.message || 'Failed to resend OTP.', false);
            }
        });
    </script>
</body>
</html>
